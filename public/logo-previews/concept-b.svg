<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Zianova logo concept B — Neural Z">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- connections -->
  <g stroke="url(#b)" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="18" x2="46" y2="18"/>
    <line x1="46" y1="18" x2="32" y2="32"/>
    <line x1="32" y1="32" x2="18" y2="46"/>
    <line x1="18" y1="46" x2="46" y2="46"/>
  </g>
  <!-- nodes -->
  <g fill="url(#b)">
    <circle cx="18" cy="18" r="4"/>
    <circle cx="46" cy="18" r="4"/>
    <circle cx="32" cy="32" r="5"/>
    <circle cx="18" cy="46" r="4"/>
    <circle cx="46" cy="46" r="4"/>
  </g>
  <!-- subtle highlight on center node -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
</svg>
