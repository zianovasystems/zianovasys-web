<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Zianova logo concept A — AI Pulse Z">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Z stroke -->
  <path d="M16 16 H48 L20 48 H48"
        fill="none"
        stroke="url(#a)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- pulse dot -->
  <circle cx="48" cy="16" r="3.5" fill="#22c55e">
    <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
