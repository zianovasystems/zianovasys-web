<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Zianova logo concept C — Aperture Z">
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- aperture frame -->
  <rect x="12" y="12" width="40" height="40" rx="8" fill="none" stroke="url(#c)" stroke-width="3"/>
  <!-- inner Z negative shape -->
  <path d="M20 22 H44 L22 42 H44"
        fill="none"
        stroke="url(#c)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- corner accents -->
  <circle cx="12" cy="12" r="2" fill="#22c55e"/>
  <circle cx="52" cy="52" r="2" fill="#06b6d4"/>
</svg>
