<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Zianova logo concept D — Mark + Wordmark">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="280" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <g>
    <rect width="64" height="64" rx="14" fill="#0f172a"/>
    <path d="M16 16 H48 L20 48 H48"
          fill="none"
          stroke="url(#d)"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <circle cx="48" cy="16" r="3" fill="#22c55e"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(80,0)">
    <text x="0" y="42"
          font-family="'Outfit','Plus Jakarta Sans',Inter,system-ui,sans-serif"
          font-weight="800"
          font-size="34"
          letter-spacing="-1.2"
          fill="#0f172a">
      Zia<tspan fill="url(#d)">nova</tspan>
    </text>
    <rect x="0" y="50" width="200" height="3" rx="1.5" fill="url(#d)" opacity="0.25"/>
    <rect x="84" y="50" width="80" height="3" rx="1.5" fill="url(#d)"/>
  </g>
</svg>
