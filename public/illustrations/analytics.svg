<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="AI-Powered Analytics dashboard">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)"/>
  <!-- soft grid -->
  <g opacity="0.12" stroke="#fff" stroke-width="1">
    <path d="M0 80 H600 M0 160 H600 M0 240 H600 M0 320 H600"/>
    <path d="M100 0 V400 M200 0 V400 M300 0 V400 M400 0 V400 M500 0 V400"/>
  </g>
  <!-- ambient blobs -->
  <circle cx="80" cy="60" r="80" fill="#22c55e" opacity="0.18"/>
  <circle cx="540" cy="340" r="100" fill="#06b6d4" opacity="0.18"/>
  <!-- card -->
  <g transform="translate(60,60)">
    <rect width="480" height="280" rx="20" fill="#ffffff" opacity="0.05"/>
    <rect width="480" height="280" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
    <!-- header dots -->
    <circle cx="24" cy="24" r="5" fill="#ef4444"/>
    <circle cx="42" cy="24" r="5" fill="#f59e0b"/>
    <circle cx="60" cy="24" r="5" fill="#22c55e"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#fff" opacity="0.7">analytics.dashboard</text>
    <!-- KPI tiles -->
    <g transform="translate(24,60)">
      <rect width="135" height="60" rx="10" fill="#ffffff" opacity="0.08"/>
      <text x="14" y="22" fill="#9ca3af" font-family="Inter,sans-serif" font-size="11">Revenue</text>
      <text x="14" y="46" fill="#22c55e" font-family="Inter,sans-serif" font-size="20" font-weight="700">$2.4M</text>
    </g>
    <g transform="translate(173,60)">
      <rect width="135" height="60" rx="10" fill="#ffffff" opacity="0.08"/>
      <text x="14" y="22" fill="#9ca3af" font-family="Inter,sans-serif" font-size="11">Active Users</text>
      <text x="14" y="46" fill="#06b6d4" font-family="Inter,sans-serif" font-size="20" font-weight="700">18.2k</text>
    </g>
    <g transform="translate(322,60)">
      <rect width="135" height="60" rx="10" fill="#ffffff" opacity="0.08"/>
      <text x="14" y="22" fill="#9ca3af" font-family="Inter,sans-serif" font-size="11">Accuracy</text>
      <text x="14" y="46" fill="#a78bfa" font-family="Inter,sans-serif" font-size="20" font-weight="700">99.4%</text>
    </g>
    <!-- bar chart -->
    <g transform="translate(24,148)">
      <rect width="270" height="110" rx="10" fill="#ffffff" opacity="0.06"/>
      <g transform="translate(20,90)">
        <rect x="0" y="-40" width="22" height="40" rx="3" fill="url(#bar1)"/>
        <rect x="36" y="-65" width="22" height="65" rx="3" fill="url(#bar1)"/>
        <rect x="72" y="-30" width="22" height="30" rx="3" fill="url(#bar1)"/>
        <rect x="108" y="-78" width="22" height="78" rx="3" fill="url(#bar1)"/>
        <rect x="144" y="-50" width="22" height="50" rx="3" fill="url(#bar1)"/>
        <rect x="180" y="-86" width="22" height="86" rx="3" fill="url(#bar1)"/>
        <rect x="216" y="-58" width="22" height="58" rx="3" fill="url(#bar1)"/>
      </g>
    </g>
    <!-- line chart -->
    <g transform="translate(308,148)">
      <rect width="149" height="110" rx="10" fill="#ffffff" opacity="0.06"/>
      <path d="M14 84 Q 40 50, 60 60 T 110 30 T 138 24" stroke="url(#line1)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="60" cy="60" r="4" fill="#22c55e"/>
      <circle cx="110" cy="30" r="4" fill="#06b6d4"/>
      <circle cx="138" cy="24" r="4" fill="#06b6d4"/>
    </g>
  </g>
</svg>
