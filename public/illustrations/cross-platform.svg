<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="Cross-Platform App devices">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c4a6e"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#cbg)"/>
  <circle cx="500" cy="80" r="120" fill="#22c55e" opacity="0.15"/>
  <circle cx="100" cy="320" r="120" fill="#06b6d4" opacity="0.15"/>

  <!-- Laptop -->
  <g transform="translate(160,120)">
    <rect x="0" y="0" width="280" height="170" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="14" y="14" width="252" height="142" rx="6" fill="url(#screen)" opacity="0.18"/>
    <!-- chrome -->
    <rect x="14" y="14" width="252" height="22" rx="6" fill="#1e293b"/>
    <circle cx="24" cy="25" r="3" fill="#ef4444"/>
    <circle cx="34" cy="25" r="3" fill="#f59e0b"/>
    <circle cx="44" cy="25" r="3" fill="#22c55e"/>
    <!-- content blocks -->
    <rect x="28" y="50" width="100" height="60" rx="6" fill="#22c55e" opacity="0.7"/>
    <rect x="138" y="50" width="60" height="28" rx="6" fill="#06b6d4" opacity="0.7"/>
    <rect x="138" y="84" width="60" height="26" rx="6" fill="#a78bfa" opacity="0.7"/>
    <rect x="208" y="50" width="46" height="28" rx="6" fill="#fbbf24" opacity="0.7"/>
    <rect x="208" y="84" width="46" height="26" rx="6" fill="#22c55e" opacity="0.7"/>
    <rect x="28" y="120" width="226" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="28" y="132" width="160" height="6" rx="3" fill="#fff" opacity="0.25"/>
    <!-- base -->
    <rect x="-30" y="170" width="340" height="10" rx="4" fill="#0f172a"/>
    <rect x="-30" y="170" width="340" height="10" rx="4" fill="#334155" opacity="0.5"/>
  </g>

  <!-- Tablet -->
  <g transform="translate(440,160)">
    <rect x="0" y="0" width="100" height="140" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="6" y="6" width="88" height="128" rx="6" fill="url(#screen)" opacity="0.2"/>
    <rect x="14" y="20" width="72" height="14" rx="4" fill="#22c55e" opacity="0.8"/>
    <rect x="14" y="42" width="48" height="10" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="14" y="58" width="60" height="10" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="14" y="78" width="72" height="32" rx="6" fill="#06b6d4" opacity="0.6"/>
  </g>

  <!-- Phone -->
  <g transform="translate(70,200)">
    <rect x="0" y="0" width="70" height="130" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="6" y="6" width="58" height="118" rx="8" fill="url(#screen)" opacity="0.25"/>
    <circle cx="35" cy="14" r="2" fill="#0f172a"/>
    <rect x="12" y="26" width="46" height="10" rx="3" fill="#22c55e" opacity="0.9"/>
    <rect x="12" y="42" width="32" height="6" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="12" y="54" width="46" height="22" rx="5" fill="#06b6d4" opacity="0.7"/>
    <rect x="12" y="82" width="46" height="22" rx="5" fill="#a78bfa" opacity="0.7"/>
  </g>
</svg>
