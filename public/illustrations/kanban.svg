      <circle cx="18" cy="22" r="5" fill="#06b6d4"/>
      <text x="32" y="26" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">IN PROGRESS</text>

      <g transform="translate(12,46)">
        <rect width="136" height="74" rx="8" fill="#1e293b"/>
        <rect x="12" y="10" width="90" height="6" rx="3" fill="#06b6d4"/>
        <rect x="12" y="22" width="110" height="6" rx="3" fill="#fff" opacity="0.6"/>
