        <rect x="12" y="10" width="80" height="6" rx="3" fill="#22c55e"/>
        <rect x="12" y="22" width="100" height="6" rx="3" fill="#fff" opacity="0.4"/>
        <path d="M112 42 l 4 4 8 -8" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
