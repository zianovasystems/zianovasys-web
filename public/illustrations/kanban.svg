        <rect x="12" y="22" width="100" height="6" rx="3" fill="#fff" opacity="0.6"/>
        <circle cx="120" cy="46" r="6" fill="#a78bfa"/>
      </g>
      <g transform="translate(12,186)">
        <rect width="136" height="60" rx="8" fill="#1e293b"/>
        <rect x="12" y="10" width="50" height="6" rx="3" fill="#fbbf24"/>
        <rect x="12" y="22" width="80" height="6" rx="3" fill="#fff" opacity="0.6"/>
        <rect x="12" y="34" width="100" height="6" rx="3" fill="#fff" opacity="0.4"/>
