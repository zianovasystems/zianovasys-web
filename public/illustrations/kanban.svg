      <circle cx="18" cy="22" r="5" fill="#94a3b8"/>
      <text x="32" y="26" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">TO DO</text>

      <g transform="translate(12,46)">
        <rect width="136" height="60" rx="8" fill="#1e293b"/>
        <rect x="12" y="10" width="80" height="6" rx="3" fill="#22c55e"/>
        <rect x="12" y="22" width="100" height="6" rx="3" fill="#fff" opacity="0.6"/>
        <rect x="12" y="34" width="60" height="6" rx="3" fill="#fff" opacity="0.4"/>
