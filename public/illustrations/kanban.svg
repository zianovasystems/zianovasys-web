<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="Agile Project Dashboard kanban board">
  <defs>
    <linearGradient id="kbg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#kbg)"/>
  <circle cx="540" cy="60" r="120" fill="#22c55e" opacity="0.18"/>
  <circle cx="60" cy="340" r="120" fill="#06b6d4" opacity="0.15"/>

  <!-- columns -->
  <g transform="translate(40,40)">
