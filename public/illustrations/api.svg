<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="Developer API Toolkit">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#abg)"/>
  <circle cx="80" cy="80" r="100" fill="#a78bfa" opacity="0.18"/>
  <circle cx="540" cy="340" r="120" fill="#22c55e" opacity="0.15"/>

  <!-- Code editor card -->
  <g transform="translate(60,70)">
    <rect width="480" height="260" rx="16" fill="#020617" stroke="#1e293b"/>
    <!-- title bar -->
    <rect width="480" height="32" rx="16" fill="#0f172a"/>
    <rect y="20" width="480" height="12" fill="#0f172a"/>
    <circle cx="18" cy="16" r="5" fill="#ef4444"/>
    <circle cx="36" cy="16" r="5" fill="#f59e0b"/>
    <circle cx="54" cy="16" r="5" fill="#22c55e"/>
    <text x="80" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">api.ts</text>

    <!-- code lines -->
    <g font-family="ui-monospace,SF Mono,monospace" font-size="14">
      <text x="24" y="68" fill="#94a3b8">1</text>
      <text x="48" y="68" fill="#a78bfa">import</text>
      <text x="106" y="68" fill="#fff">{ </text>
      <text x="120" y="68" fill="#22c55e">Zianova</text>
      <text x="180" y="68" fill="#fff"> } </text>
      <text x="200" y="68" fill="#a78bfa">from</text>
      <text x="240" y="68" fill="#fbbf24">'@zianova/sdk'</text>

      <text x="24" y="98" fill="#94a3b8">2</text>

      <text x="24" y="128" fill="#94a3b8">3</text>
      <text x="48" y="128" fill="#a78bfa">const</text>
      <text x="92" y="128" fill="#06b6d4">client</text>
      <text x="140" y="128" fill="#fff"> = </text>
      <text x="160" y="128" fill="#a78bfa">new</text>
      <text x="194" y="128" fill="#22c55e">Zianova</text>
      <text x="252" y="128" fill="#fff">({ </text>
      <text x="272" y="128" fill="#06b6d4">apiKey</text>
      <text x="316" y="128" fill="#fff">: </text>
      <text x="328" y="128" fill="#fbbf24">'***'</text>
      <text x="358" y="128" fill="#fff"> })</text>

      <text x="24" y="158" fill="#94a3b8">4</text>

      <text x="24" y="188" fill="#94a3b8">5</text>
      <text x="48" y="188" fill="#a78bfa">await</text>
      <text x="92" y="188" fill="#06b6d4">client</text>
      <text x="140" y="188" fill="#fff">.</text>
      <text x="146" y="188" fill="#22c55e">predict</text>
      <text x="200" y="188" fill="#fff">({ </text>
      <text x="220" y="188" fill="#06b6d4">input</text>
      <text x="256" y="188" fill="#fff">: </text>
      <text x="270" y="188" fill="#fbbf24">data</text>
      <text x="298" y="188" fill="#fff"> })</text>

      <text x="24" y="218" fill="#94a3b8">6</text>
      <text x="48" y="218" fill="#22c55e" font-weight="600">// → 200 OK · 12ms</text>
    </g>

    <!-- response chip -->
    <g transform="translate(330,40)">
      <rect width="130" height="36" rx="18" fill="#22c55e" opacity="0.18"/>
      <circle cx="20" cy="18" r="6" fill="#22c55e"/>
      <text x="34" y="22" font-family="Inter,sans-serif" font-size="12" fill="#22c55e" font-weight="600">200 OK · 12ms</text>
    </g>
  </g>
</svg>
